<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Card Generator | Real-Time</title>
    
    <!-- Performance: Preconnect to speed up First Contentful Paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=block" rel="stylesheet">

    <style>
        :root {
            --primary: #1d4ed8; 
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-sub: #475569;
            --border: #cbd5e1;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: var(--text-main);
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            height: 48px; /* Touch target fix */
            background: white;
            color: var(--primary);
            text-decoration: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        main {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }

        @media (min-width: 900px) {
            main { grid-template-columns: 1fr 1.2fr; }
        }

        .panel {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.25rem;
            margin-bottom: 24px;
        }

        .form-group { margin-bottom: 20px; }
        
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-sub);
        }

        input, select {
            width: 100%;
            height: 48px; /* Accessible touch target */
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            height: 48px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #e2e8f0; color: var(--text-main); }

        /* Card Preview Styles */
        .card-preview {
            background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
            border-radius: 16px;
            padding: 30px;
            color: white;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.2);
            aspect-ratio: 1.58 / 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: sticky;
            top: 20px;
        }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }

        .card-logo {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .card-chip {
            width: 50px;
            height: 38px;
            background: linear-gradient(135deg, #fbbf24, #d97706);
            border-radius: 6px;
            position: relative;
        }

        .card-number {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin: 20px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 10px;
        }

        .card-info-block { flex: 1; }

        .label-small { font-size: 10px; text-transform: uppercase; opacity: 0.7; margin-bottom: 2px; }
        .val-medium { font-size: 14px; font-weight: 600; word-break: break-all; }

        .routing-display {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--text-sub);
            text-align: right;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            font-size: 0.8rem;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Bank Card Generator</h1>
            <a href="index.html" class="nav-link">
                <span class="material-icons">chevron_left</span> Back to Routing Finder
            </a>
        </header>

        <main>
            <!-- Form Section -->
            <section class="panel">
                <h2 class="section-title"><span class="material-icons">settings</span> Real-Time Configuration</h2>
                
                <div class="form-group">
                    <label for="bankSelect">Select Bank</label>
                    <select id="bankSelect">
                        <option value="">Loading banks...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="branchSelect">Select Branch</label>
                    <select id="branchSelect">
                        <option value="">Select a bank first</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="acctTitle">Account Title</label>
                    <input type="text" id="acctTitle" placeholder="e.g. John Smith" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="acctNumber">Account Number</label>
                    <input type="text" id="acctNumber" placeholder="Enter account number" autocomplete="off">
                </div>

                <div class="btn-group">
                    <button id="downloadBtn" class="btn btn-primary">
                        <span class="material-icons">file_download</span> Save PNG
                    </button>
                    <button id="copyBtn" class="btn btn-secondary">
                        <span class="material-icons">content_copy</span> Copy Details
                    </button>
                </div>
            </section>

            <!-- Preview Section -->
            <section>
                <div id="cardElement" class="card-preview">
                    <div class="card-top">
                        <div class="card-logo" id="previewLogo">BANK</div>
                        <div class="card-chip"></div>
                    </div>

                    <div class="card-number" id="previewNumber">0000 0000 0000 0000</div>

                    <div class="card-footer">
                        <div class="card-info-block">
                            <div class="label-small">Account Title</div>
                            <div class="val-medium" id="previewTitle">HOLDER NAME</div>
                        </div>
                        <div class="card-info-block" style="text-align: right;">
                            <div class="label-small" id="previewBank">Bank Name</div>
                            <div class="val-medium" id="previewBranch">Branch Name</div>
                        </div>
                    </div>
                </div>
                <div class="routing-display">
                    <strong>Routing Number:</strong> <span id="previewRouting">---------</span>
                </div>
            </section>
        </main>

        <footer>
            <p>Generated for visual reference only. Use with caution.</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
    
    <script>
        let banksData = [];

        // UI References
        const bankSelect = document.getElementById('bankSelect');
        const branchSelect = document.getElementById('branchSelect');
        const acctTitle = document.getElementById('acctTitle');
        const acctNumber = document.getElementById('acctNumber');

        const previewLogo = document.getElementById('previewLogo');
        const previewNumber = document.getElementById('previewNumber');
        const previewTitle = document.getElementById('previewTitle');
        const previewBank = document.getElementById('previewBank');
        const previewBranch = document.getElementById('previewBranch');
        const previewRouting = document.getElementById('previewRouting');

        async function init() {
            try {
                const response = await fetch('banks.json');
                banksData = await response.json();
                populateBanks();
            } catch (e) {
                bankSelect.innerHTML = '<option>Failed to load banks</option>';
            }
        }

        function populateBanks() {
            bankSelect.innerHTML = '<option value="">-- Choose Bank --</option>';
            banksData.forEach(bank => {
                let opt = document.createElement('option');
                opt.value = bank.name;
                opt.textContent = bank.name;
                bankSelect.appendChild(opt);
            });
        }

        // Real-Time Event: Bank Selection
        bankSelect.addEventListener('change', (e) => {
            const selectedBank = banksData.find(b => b.name === e.target.value);
            
            branchSelect.innerHTML = '<option value="">-- Select Branch --</option>';
            
            if (selectedBank) {
                selectedBank.branches.forEach(br => {
                    let opt = document.createElement('option');
                    opt.value = br.routing;
                    opt.textContent = br.display;
                    branchSelect.appendChild(opt);
                });
                
                previewBank.textContent = selectedBank.name;
                previewLogo.textContent = selectedBank.name.substring(0, 4);
            } else {
                previewBank.textContent = "Bank Name";
                previewLogo.textContent = "BANK";
            }
            updateBranchDetails();
        });

        // Real-Time Event: Branch Selection
        branchSelect.addEventListener('change', updateBranchDetails);

        function updateBranchDetails() {
            const selectedOpt = branchSelect.options[branchSelect.selectedIndex];
            previewBranch.textContent = branchSelect.value ? selectedOpt.text : "Branch Name";
            previewRouting.textContent = branchSelect.value || "---------";
        }

        // Real-Time Event: Account Title typing
        acctTitle.addEventListener('input', (e) => {
            previewTitle.textContent = e.target.value.toUpperCase() || "HOLDER NAME";
        });

        // Real-Time Event: Account Number typing (No dots, just formatting)
        acctNumber.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\s+/g, ''); // remove existing spaces
            // Add a space every 4 digits for readability, but keep numbers visible
            let formatted = val.match(/.{1,4}/g)?.join(' ') || "";
            previewNumber.textContent = formatted || "0000 0000 0000 0000";
        });

        // Download PNG Function
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const card = document.getElementById('cardElement');
            const canvas = await html2canvas(card, { 
                scale: 3, 
                backgroundColor: null,
                logging: false 
            });
            const link = document.createElement('a');
            link.download = `bank-card-${acctTitle.value || 'preview'}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });

        // Copy Text Details
        document.getElementById('copyBtn').addEventListener('click', () => {
            const details = `
Bank: ${previewBank.textContent}
Branch: ${previewBranch.textContent}
Routing: ${previewRouting.textContent}
Title: ${previewTitle.textContent}
A/C: ${acctNumber.value}
            `.trim();
            navigator.clipboard.writeText(details);
            alert("Details copied to clipboard!");
        });

        init();
    </script>
</body>
</html>
